<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- 常见中文字体别名映射：若系统无 SimSun/宋体/黑体，用开源 CJK 字体兜底 -->
  <alias><family>SimSun</family><prefer>
    <family>Noto Serif CJK SC</family><family>WenQuanYi Micro Hei</family>
  </prefer></alias>
  <alias><family>NSimSun</family><prefer>
    <family>Noto Serif CJK SC</family><family>WenQuanYi Micro Hei</family>
  </prefer></alias>
  <alias><family>宋体</family><prefer>
    <family>Noto Serif CJK SC</family><family>WenQuanYi Micro Hei</family>
  </prefer></alias>
  <alias><family>黑体</family><prefer>
    <family>Noto Sans CJK SC</family><family>WenQuanYi Zen Hei</family>
  </prefer></alias>
</fontconfig>